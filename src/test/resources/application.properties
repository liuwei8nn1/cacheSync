
spring.application.name=testApp
cache.sync.enabled=true
cache.sync.streamKey=cache:sync:stream:test002
cache.sync.messageTimeoutMs=300000
cache.sync.maxRetry=3
cache.sync.batchSize=10
cache.sync.blockMs=5000
cache.sync.maxlen=10000
cache.sync.threadPoolSize=1
cache.sync.enableMetrics=true


spring.data.redis.host=localhost
spring.data.redis.port=6379